<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Router API Cockpit — Admin Dashboard">
  <title>Router API — Cockpit</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Styles (modular CSS entry point) -->
  <link rel="stylesheet" href="/index.css">
</head>
<body>

  <!-- ── Animated Particle Background ── -->
  <canvas id="particles-canvas"></canvas>

  <!-- ── DevTools Security Modal ── -->
  <div id="dtw">
    <div class="dtw-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>
    <h2 data-i18n="dtw_title">Cảnh báo bảo mật</h2>
    <p data-i18n="dtw_desc">Phát hiện DevTools.<br>Vui lòng đóng lại để tiếp tục.</p>
  </div>

  <!-- ── Login Screen ── -->
  <div id="ls">
    <div class="lc">
      <div class="ll">
        <div class="ll-ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </div>
        <h1 data-i18n="login_title">Router API</h1>
        <p data-i18n="login_desc">Cockpit Dashboard — Restricted Access</p>
      </div>
      <div class="lg">
        <label data-i18n="login_label">Khóa xác thực (Auth Key)</label>
        <div class="liw">
          <input type="password" id="ki" placeholder="sk-..." autocomplete="off" spellcheck="false">
          <button class="ley" onclick="toggleEye()" id="eb">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button class="lb" id="lbtn" onclick="doLogin()" data-i18n="login_btn">Đăng nhập vào Cockpit</button>
      <div class="le" id="lerr"></div>
      <div class="lf" data-i18n="login_footer">🔒 Khóa xác thực không được lưu trữ sau khi đăng xuất</div>
    </div>
  </div>

  <!-- ── Main App Shell ── -->
  <div id="app" style="display:none">

    <!-- Header -->
    <div id="hdr">
      <div class="hbr">
        <span class="live"></span>
        <span data-i18n="header_title">Router API Cockpit</span>
      </div>
      <div class="hsp"></div>
      <div class="hrf" id="rfind"></div>

      <!-- Selectors: Language & Theme -->
      <div class="hdr-selectors">
        <!-- Language -->
        <div class="custom-select" id="lang-select-wrapper">
          <div class="select-trigger" onclick="toggleDropdown(event,'lang-options')">
            <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <span id="selected-lang-text">Tiếng Việt</span>
            <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="select-options" id="lang-options">
            <div class="option-item" onclick="changeLang('vi')" data-value="vi">Tiếng Việt</div>
            <div class="option-item" onclick="changeLang('en')" data-value="en">English</div>
            <div class="option-item" onclick="changeLang('ja')" data-value="ja">日本語</div>
          </div>
        </div>

        <!-- Theme -->
        <div class="custom-select" id="theme-select-wrapper">
          <div class="select-trigger" onclick="toggleDropdown(event,'theme-options')">
            <span id="selected-theme-icon-wrapper" style="display:flex;align-items:center">
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20"></path>
                <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
                <path d="M12 22a10 10 0 0 0 0-20z"></path>
              </svg>
            </span>
            <span id="selected-theme-text">Auto</span>
            <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="select-options" id="theme-options">
            <div class="option-item" onclick="changeTheme('auto')" data-value="auto">
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path><path d="M12 22a10 10 0 0 0 0-20z"></path></svg>
              <span data-i18n="theme_auto">Tự động</span>
            </div>
            <div class="option-item" onclick="changeTheme('dark')" data-value="dark">
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              <span data-i18n="theme_dark">Tối</span>
            </div>
            <div class="option-item" onclick="changeTheme('light')" data-value="light">
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
              <span data-i18n="theme_light">Sáng</span>
            </div>
            <div class="option-item" onclick="changeTheme('sakura')" data-value="sakura">
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#ff4d6d"><path d="M12 12c.5-3.5 2.5-4.5 3.5-3.5s-.5 3-3.5 3.5z"></path><path d="M12 12c3 .5 4.5 2.5 3.5 3.5s-3-.5-3.5-3.5z"></path><path d="M12 12c-.5 3.5-2.5 4.5-3.5 3.5s.5-3 3.5-3.5z"></path><path d="M12 12c-3-.5-4.5-2.5-3.5-3.5s3 .5 3.5 3.5z"></path><circle cx="12" cy="12" r="1.5"></circle></svg>
              <span data-i18n="theme_sakura">Sakura</span>
            </div>
          </div>
        </div>
      </div>

      <!-- User badge & logout -->
      <div class="hub">
        <span id="uname">—</span>
        <span class="tb" id="utier">—</span>
      </div>
      <button class="hlo" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span data-i18n="logout_btn">Đăng xuất</span>
      </button>
    </div>

    <!-- Body: sidebar + main content -->
    <div id="body2">

      <!-- Sidebar Navigation -->
      <nav id="side">
        <!-- Admin tabs -->
        <button class="ni admin-only" onclick="go('ov')"       id="nv-ov">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg></span>
          <span data-i18n="nav_ov">Tổng quan</span>
        </button>
        <button class="ni admin-only" onclick="go('ks')"       id="nv-ks">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg></span>
          <span data-i18n="nav_ks">Gemini Keys</span>
          <span class="nbg" id="nbf" style="display:none">0</span>
        </button>
        <button class="ni admin-only" onclick="go('ac')"       id="nv-ac">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span>
          <span data-i18n="nav_ac">Tài khoản con</span>
        </button>

        <div class="ndv admin-only"></div>

        <button class="ni admin-only" onclick="go('us')"       id="nv-us">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg></span>
          <span data-i18n="nav_us">Phân tích Token</span>
        </button>
        <button class="ni admin-only" onclick="go('ep')"       id="nv-ep">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg></span>
          <span data-i18n="nav_ep">Endpoints</span>
        </button>
        <button class="ni admin-only" onclick="go('pe')"       id="nv-pe">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></span>
          <span data-i18n="nav_pe">Penalties</span>
          <span class="nbg" id="nbp" style="display:none">0</span>
        </button>
        <button class="ni admin-only" onclick="go('mu')"       id="nv-mu">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg></span>
          <span data-i18n="nav_mu">Pool Structure</span>
        </button>


        <div class="ndv"></div>

        <!-- User tabs (all tiers) -->
        <button class="ni" onclick="go('myacc')"  id="nv-myacc">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
          <span data-i18n="nav_myacc">Tài khoản của tôi</span>
        </button>
        <button class="ni" onclick="go('myuse')"  id="nv-myuse">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span>
          <span data-i18n="nav_myuse">Usage của tôi</span>
        </button>
      </nav>

      <!-- Main content — tabs injected here dynamically by nav.js -->
      <main id="main2"></main>
    </div>
  </div>

  <!-- ES6 Module Entry Point -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
